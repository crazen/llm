<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>NIM Chat — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg: #04070f;
      --surface: rgba(255,255,255,0.04);
      --border: rgba(255,255,255,0.08);
      --accent: #4f8ef7;
      --accent2: #a78bfa;
      --text: #f0f4ff;
      --muted: rgba(240,244,255,0.45);
      --error: #f87171;
      --success: #34d399;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated mesh background */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .bg-mesh::before {
      content: '';
      position: absolute;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(79,142,247,0.12) 0%, transparent 70%);
      top: -200px; left: -100px;
      animation: drift1 12s ease-in-out infinite alternate;
    }
    .bg-mesh::after {
      content: '';
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.1) 0%, transparent 70%);
      bottom: -150px; right: -100px;
      animation: drift2 15s ease-in-out infinite alternate;
    }
    @keyframes drift1 { to { transform: translate(60px, 40px); } }
    @keyframes drift2 { to { transform: translate(-50px, -60px); } }

    /* Grid texture overlay */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(79,142,247,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,142,247,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 420px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(79,142,247,0.08),
        0 32px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.06);
      animation: slideUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Logo / header */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: -0.5px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .card-subtitle {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 36px;
      font-weight: 300;
    }

    /* Tabs */
    .tabs {
      display: flex;
      background: rgba(255,255,255,0.04);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
      border: 1px solid var(--border);
    }
    .tab {
      flex: 1;
      padding: 9px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab.active {
      background: rgba(79,142,247,0.15);
      color: var(--accent);
      border: 1px solid rgba(79,142,247,0.25);
    }

    /* Form fields */
    .field {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input::placeholder { color: rgba(240,244,255,0.2); }
    input:focus {
      border-color: rgba(79,142,247,0.5);
      background: rgba(79,142,247,0.06);
    }

    /* Button */
    .btn-primary {
      width: 100%;
      margin-top: 8px;
      padding: 13px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-primary::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Message */
    #msg {
      margin-top: 16px;
      font-size: 13px;
      min-height: 18px;
      text-align: center;
      border-radius: 8px;
      padding: 0;
      transition: all 0.3s;
    }
    #msg.error {
      color: var(--error);
      background: rgba(248,113,113,0.08);
      padding: 10px 14px;
      border: 1px solid rgba(248,113,113,0.2);
    }
    #msg.success {
      color: var(--success);
      background: rgba(52,211,153,0.08);
      padding: 10px 14px;
      border: 1px solid rgba(52,211,153,0.2);
    }

    /* Spinner inside button */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    .card-footer {
      margin-top: 28px;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 460px) {
      .card { width: 94vw; padding: 36px 28px; }
    }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  <div class="bg-grid"></div>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">🤖</div>
      <span class="logo-text">NIM Chat</span>
    </div>
    <p class="card-subtitle">Inteligência aumentada com seus documentos</p>

    <div class="tabs">
      <button class="tab active" id="tabSignIn" onclick="switchTab('signin')">Entrar</button>
      <button class="tab" id="tabSignUp" onclick="switchTab('signup')">Criar conta</button>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="seu@exemplo.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label for="password">Senha</label>
      <input id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn-primary" id="btnAction">Entrar</button>
    <div id="msg"></div>

    <div class="card-footer">
      Plataforma RAG com Knowledge Graph, HyDE e Reranking
    </div>
  </div>

  <script>
    const SUPABASE_URL  = "https://fxafybrtuvxaxlrxhepq.supabase.co";
    const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4YWZ5YnJ0dXZ4YXhscnhoZXBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE4Njk3MDksImV4cCI6MjA3NzQ0NTcwOX0.F2V0DZYQV_2YkAQAzdwXlu_AbU1IFq49TE6PcihTk1c";
    const API_BASE      = "http://localhost:8000";  // URL da sua FastAPI

    const sb  = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
    let mode  = "signin";

    function switchTab(m) {
      mode = m;
      document.getElementById("tabSignIn").classList.toggle("active", m === "signin");
      document.getElementById("tabSignUp").classList.toggle("active", m === "signup");
      document.getElementById("btnAction").textContent = m === "signin" ? "Entrar" : "Criar conta";
      setMsg("", "");
    }

    function setMsg(text, type) {
      const el = document.getElementById("msg");
      el.textContent = text;
      el.className = type || "";
    }

    function setLoading(loading) {
      const btn = document.getElementById("btnAction");
      btn.disabled = loading;
      btn.innerHTML = loading
        ? `<span class="spinner"></span> Aguarde...`
        : (mode === "signin" ? "Entrar" : "Criar conta");
    }

    document.getElementById("btnAction").addEventListener("click", async () => {
      setMsg("", "");
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) {
        setMsg("Preencha email e senha.", "error"); return;
      }

      setLoading(true);

      if (mode === "signin") {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });
        if (error) { setMsg("Erro: " + error.message, "error"); setLoading(false); return; }

        // Salva token no localStorage para usar nas chamadas à FastAPI
        localStorage.setItem("access_token", data.session.access_token);
        localStorage.setItem("user_id", data.user.id);

        setMsg("Login realizado! Redirecionando...", "success");
        setTimeout(() => window.location.href = "chat.html", 900);

      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) { setMsg("Erro: " + error.message, "error"); setLoading(false); return; }
        setMsg("Conta criada! Verifique seu email e faça login.", "success");
        setLoading(false);
      }
    });

    // Enter key
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") document.getElementById("btnAction").click();
    });

    // Se já logado, redirecionar
    (async () => {
      const { data } = await sb.auth.getSession();
      if (data?.session) {
        localStorage.setItem("access_token", data.session.access_token);
        localStorage.setItem("user_id", data.session.user.id);
        window.location.href = "chat.html";
      }
    })();
  </script>
</body>
</html>
