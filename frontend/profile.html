<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>NIM Chat — Perfil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    :root {
      --bg:      #060a14;
      --surface: rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.07);
      --accent:  #4f8ef7;
      --accent2: #a78bfa;
      --text:    #eef2ff;
      --muted:   rgba(238,242,255,0.4);
      --success: #34d399;
      --danger:  #f87171;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Mesh bg */
    .bg-mesh {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .bg-mesh::before {
      content: '';
      position: absolute;
      width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(79,142,247,0.08) 0%, transparent 70%);
      top: -100px; right: 0;
    }
    .bg-mesh::after {
      content: '';
      position: absolute;
      width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(167,139,250,0.07) 0%, transparent 70%);
      bottom: 0; left: -100px;
    }

    /* Layout */
    .container {
      position: relative; z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    /* Back button */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: none; border: none;
      color: var(--muted); font-family: 'DM Sans', sans-serif;
      font-size: 14px; cursor: pointer;
      padding: 6px 0;
      transition: color 0.15s;
      margin-bottom: 32px;
    }
    .back-btn:hover { color: var(--text); }

    /* Page title */
    .page-title {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 28px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, var(--text) 60%, var(--muted));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 36px; }

    /* Card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 16px;
      backdrop-filter: blur(12px);
    }
    .card-label {
      font-size: 11px; font-weight: 600;
      letter-spacing: 1px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 20px;
    }

    /* Avatar section */
    .avatar-section {
      display: flex; align-items: center; gap: 24px;
    }
    .avatar-wrap {
      position: relative;
    }
    .avatar-img {
      width: 90px; height: 90px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex; align-items: center; justify-content: center;
      font-size: 32px; font-weight: 800; color: white;
      overflow: hidden;
      border: 3px solid rgba(255,255,255,0.08);
    }
    .avatar-img img { width: 100%; height: 100%; object-fit: cover; }
    .avatar-overlay {
      position: absolute; inset: 0; border-radius: 50%;
      background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.2s;
      cursor: pointer; font-size: 20px;
    }
    .avatar-wrap:hover .avatar-overlay { opacity: 1; }
    #avatarInput { display: none; }

    .avatar-info h3 {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: 20px;
      margin-bottom: 4px;
    }
    .avatar-info p { color: var(--muted); font-size: 14px; margin-bottom: 12px; }
    .btn-change-avatar {
      padding: 7px 16px;
      border: 1px solid rgba(79,142,247,0.35);
      border-radius: 8px;
      background: rgba(79,142,247,0.08);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-change-avatar:hover { background: rgba(79,142,247,0.15); }

    /* Form fields */
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }
    label {
      display: block;
      font-size: 12px; font-weight: 500;
      color: var(--muted); letter-spacing: 0.5px;
      text-transform: uppercase; margin-bottom: 8px;
    }
    input[type="text"], input[type="email"] {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    input:focus {
      border-color: rgba(79,142,247,0.5);
      background: rgba(79,142,247,0.06);
    }
    input:disabled {
      opacity: 0.5; cursor: not-allowed;
    }
    .input-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* Save button */
    .btn-save {
      width: 100%; padding: 12px;
      border: none; border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), #6366f1);
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      margin-top: 4px;
    }
    .btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-save:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* Danger zone */
    .danger-card {
      background: rgba(248,113,113,0.04);
      border-color: rgba(248,113,113,0.15);
    }
    .btn-danger {
      padding: 10px 20px;
      border: 1px solid rgba(248,113,113,0.35);
      border-radius: 10px;
      background: transparent;
      color: var(--danger);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-danger:hover { background: rgba(248,113,113,0.08); }

    /* Toast */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: rgba(30,35,55,0.95);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 20px;
      font-size: 13px; backdrop-filter: blur(12px);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
      z-index: 100;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: rgba(52,211,153,0.3); color: var(--success); }
    .toast.error   { border-color: rgba(248,113,113,0.3); color: var(--danger); }
  </style>
</head>
<body>
<div class="bg-mesh"></div>

<div class="container">
  <button class="back-btn" onclick="window.location.href='chat.html'">
    ← Voltar ao chat
  </button>

  <h1 class="page-title">Meu Perfil</h1>
  <p class="page-sub">Gerencie suas informações pessoais e preferências</p>

  <!-- Avatar + info -->
  <div class="card">
    <div class="card-label">Foto de perfil</div>
    <div class="avatar-section">
      <div class="avatar-wrap" onclick="document.getElementById('avatarInput').click()">
        <div class="avatar-img" id="avatarDisplay">?</div>
        <div class="avatar-overlay">📷</div>
      </div>
      <div class="avatar-info">
        <h3 id="displayName">Carregando...</h3>
        <p id="displayEmail">—</p>
        <button class="btn-change-avatar" onclick="document.getElementById('avatarInput').click()">
          Alterar foto
        </button>
      </div>
    </div>
    <input type="file" id="avatarInput" accept="image/png,image/jpeg,image/webp" onchange="uploadAvatar(this.files[0])">
  </div>

  <!-- Edit name -->
  <div class="card">
    <div class="card-label">Informações da conta</div>
    <div class="field">
      <label for="fullName">Nome completo</label>
      <input type="text" id="fullName" placeholder="Seu nome completo"/>
    </div>
    <div class="field">
      <label for="emailField">Email</label>
      <input type="email" id="emailField" disabled/>
      <div class="input-hint">O email não pode ser alterado por aqui.</div>
    </div>
    <button class="btn-save" id="btnSave" onclick="saveProfile()">Salvar alterações</button>
  </div>

  <!-- Danger zone -->
  <div class="card danger-card">
    <div class="card-label">Sessão</div>
    <p style="font-size:13px; color:var(--muted); margin-bottom:14px;">
      Encerrar a sessão atual em todos os dispositivos.
    </p>
    <button class="btn-danger" onclick="logout()">Sair da conta</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "http://localhost:8000";
const SUPABASE_URL  = "https://fxafybrtuvxaxlrxhepq.supabase.co";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ4YWZ5YnJ0dXZ4YXhscnhoZXBxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjE4Njk3MDksImV4cCI6MjA3NzQ0NTcwOX0.F2V0DZYQV_2YkAQAzdwXlu_AbU1IFq49TE6PcihTk1c";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const token = localStorage.getItem("access_token") || "";
if (!token) window.location.href = "login.html";

function authHeaders() {
  return { "Content-Type": "application/json", "Authorization": `Bearer ${token}` };
}

let toastTimer;
function showToast(msg, type = "") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2800);
}

async function loadProfile() {
  const [profileRes, userRes] = await Promise.all([
    fetch(`${API}/profile`, { headers: authHeaders() }).then(r => r.json()),
    sb.auth.getUser(token)
  ]);

  const email = userRes.data?.user?.email || "";
  document.getElementById("emailField").value = email;
  document.getElementById("displayEmail").textContent = email;

  if (profileRes.full_name) {
    document.getElementById("fullName").value = profileRes.full_name;
    document.getElementById("displayName").textContent = profileRes.full_name;
    document.getElementById("avatarDisplay").textContent = profileRes.full_name[0].toUpperCase();
  } else {
    const name = email.split("@")[0];
    document.getElementById("displayName").textContent = name;
    document.getElementById("avatarDisplay").textContent = name[0]?.toUpperCase() || "?";
  }

  if (profileRes.avatar_url) {
    document.getElementById("avatarDisplay").innerHTML = `<img src="${profileRes.avatar_url}" alt="avatar">`;
  }
}

async function saveProfile() {
  const name = document.getElementById("fullName").value.trim();
  const btn = document.getElementById("btnSave");
  btn.disabled = true; btn.textContent = "Salvando...";

  await fetch(`${API}/profile`, {
    method: "PATCH",
    headers: authHeaders(),
    body: JSON.stringify({ full_name: name })
  });

  document.getElementById("displayName").textContent = name || "—";
  if (name) document.getElementById("avatarDisplay").textContent = name[0].toUpperCase();
  showToast("✅ Perfil salvo com sucesso!", "success");
  btn.disabled = false; btn.textContent = "Salvar alterações";
}

async function uploadAvatar(file) {
  if (!file) return;
  showToast("Enviando foto...");
  const form = new FormData();
  form.append("file", file);

  const res = await fetch(`${API}/profile/avatar`, {
    method: "POST",
    headers: { "Authorization": `Bearer ${token}` },
    body: form
  });
  const data = await res.json();

  if (data.avatar_url) {
    document.getElementById("avatarDisplay").innerHTML = `<img src="${data.avatar_url}" alt="avatar">`;
    showToast("✅ Foto atualizada!", "success");
  } else {
    showToast("Erro ao enviar foto", "error");
  }
  document.getElementById("avatarInput").value = "";
}

async function logout() {
  await sb.auth.signOut();
  localStorage.clear();
  window.location.href = "login.html";
}

loadProfile();
</script>
</body>
</html>
